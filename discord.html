<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Chat & Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.7.2.2.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f1015;
            color: #ffffff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar-left {
            width: 280px;
            background: #16171d;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-left h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #00ffcc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-call {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #23242c;
            border: 2px solid transparent;
            color: #ffffff;
            padding: 12px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-call i {
            background: #5865F2;
            padding: 10px;
            border-radius: 50%;
            font-size: 1rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-call.active {
            border-color: #00ffcc;
            background: #1a2725;
        }

        .btn-call.active i {
            background: #00ffcc;
            color: #0f1015;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1c23;
        }

        .chat-header {
            padding: 20px;
            background: #16171d;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            padding: 12px;
            border-radius: 8px;
            width: fit-content;
            max-width: 80%;
        }

        .message img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .message-content {
            display: flex;
            flex-direction: column;
        }

        .message .user-name {
            font-size: 0.9rem;
            color: #00ffcc;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .chat-input-container {
            padding: 20px;
            background: #16171d;
        }

        .chat-input-form {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #23242c;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 8px;
            color: #ffffff;
            outline: none;
            font-size: 1rem;
        }

        .btn-send {
            background: #0077ff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .sidebar-right {
            width: 280px;
            background: #16171d;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .profile-card {
            background: #23242c;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #0077ff;
        }

        .profile-card h3 {
            font-size: 1.1rem;
            color: #ffffff;
        }

        .edit-profile-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .edit-profile-box label {
            font-size: 0.85rem;
            color: #b9bbbe;
            text-transform: uppercase;
        }

        .edit-profile-box input {
            background: #23242c;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 6px;
            color: #ffffff;
            outline: none;
        }

        .btn-save {
            background: #00ffcc;
            color: #0f1015;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar-left">
        <h2>Canais de Voz</h2>
        <button class="btn-call" id="callBtn" onclick="toggleCall()">
            <i class="fa-solid fa-phone"></i>
            <span>Call 1</span>
        </button>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <i class="fa-solid fa-hashtag"></i> chat-geral
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=CyberAdmin" alt="Avatar">
                <div class="message-content">
                    <div class="user-name">Sistema Cyber</div>
                    Conectado ao servidor público global! Qualquer pessoa abrindo este link agora lerá e enviará mensagens juntas.
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <form class="chat-input-form" onsubmit="sendMessage(event)">
                <input type="text" id="messageInput" class="chat-input" placeholder="Conversar em #chat-geral" autocomplete="off">
                <button type="submit" class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <div class="sidebar-right">
        <h2>Seu Perfil</h2>
        <div class="profile-card">
            <img id="currentAvatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=User" alt="Sua Foto">
            <h3 id="currentName">Usuário_Cyber</h3>
        </div>

        <div class="edit-profile-box">
            <div>
                <label>Mudar Nome</label>
                <input type="text" id="inputName" value="Usuário_Cyber">
            </div>
            <div>
                <label>URL da Foto (Link)</label>
                <input type="text" id="inputAvatar" placeholder="Cole o link de uma imagem">
            </div>
            <button class="btn-save" onclick="updateProfile()">Salvar Alterações</button>
        </div>
    </div>

    <script>
        // Configuração de chaves de demonstração públicas do PubNub (funcionam direto)
        const pubnub = new PubNub({
            publishKey: 'pub-c-4614ff73-7db4-47bd-a685-618d6e7f867c',
            subscribeKey: 'sub-c-ee379c2a-b7dc-401d-9e6e-cb407ef90e0c',
            userId: "user_" + Math.random().toString(36).substring(2, 9)
        });

        let currentUser = {
            name: "Usuário_" + Math.floor(Math.random() * 900 + 100),
            avatar: ""
        };
        currentUser.avatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${currentUser.name}`;

        // Inicializa interface com dados gerados
        document.getElementById('currentName').innerText = currentUser.name;
        document.getElementById('currentAvatar').src = currentUser.avatar;
        document.getElementById('inputName').value = currentUser.name;

        // Se inscreve no canal de rede do servidor público
        pubnub.subscribe({
            channels: ['cyber-comunidade-chat']
        });

        // Escuta o servidor para quando novas mensagens de outras pessoas chegarem
        pubnub.addListener({
            message: function(event) {
                const data = event.message;
                const chatMessages = document.getElementById('chatMessages');
                
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.innerHTML = `
                    <img src="${data.avatar}" alt="Avatar">
                    <div class="message-content">
                        <div class="user-name">${data.name}</div>
                        <div>${data.text}</div>
                    </div>
                `;
                
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        });

        function updateProfile() {
            const nameInput = document.getElementById('inputName').value.trim();
            const avatarInput = document.getElementById('inputAvatar').value.trim();

            if (nameInput !== "") currentUser.name = nameInput;
            if (avatarInput !== "") {
                currentUser.avatar = avatarInput;
            } else {
                currentUser.avatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${currentUser.name}`;
            }

            document.getElementById('currentName').innerText = currentUser.name;
            document.getElementById('currentAvatar').src = currentUser.avatar;
        }

        // Publica a mensagem enviando para o servidor central e repassando a todos online
        function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (text !== '') {
                pubnub.publish({
                    channel: 'cyber-comunidade-chat',
                    message: {
                        name: currentUser.name,
                        avatar: currentUser.avatar,
                        text: text
                    }
                });
                input.value = '';
            }
        }

        async function toggleCall() {
            const btn = document.getElementById('callBtn');
            if (!btn.classList.contains('active')) {
                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                    btn.classList.add('active');
                    btn.querySelector('span').innerText = 'Conectado';
                } catch (err) {
                    alert('Permissão recusada.');
                }
            } else {
                btn.classList.remove('active');
                btn.querySelector('span').innerText = 'Call 1';
            }
        }
    </script>
</body>
</html>
